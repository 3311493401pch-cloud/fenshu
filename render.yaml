# Render Blueprint
services:
  - type: web
    name: fenshu
    runtime: node
    region: singapore
    plan: free
    healthCheckPath: /health
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: ADMIN_PASSWORD
        sync: false

databases: []
